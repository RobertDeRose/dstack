from_latest_tag = true
tag_prefix = "v"

[commit_types]
build = { omit_from_changelog = true }
chore = { omit_from_changelog = true }
ci = { omit_from_changelog = true }
docs = { omit_from_changelog = true }
feat = { changelog_title = "Added" }
fix = { changelog_title = "Fixed" }
perf = { changelog_title = "Performance" }
refactor = { changelog_title = "Changed" }
release = { changelog_title = "", omit_from_changelog = true }
