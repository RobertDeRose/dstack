#:schema https://mise.jdx.dev/schema/mise.json

[tools]
"github:anordal/shellharden" = "latest"
"npm:@contextlint/cli" = "latest"
"npm:markdown-table-formatter" = "latest"
"npm:markdownlint-cli" = "latest"
actionlint = "latest"
aube = "latest"
betterleaks = "latest"
cocogitto = "latest"
editorconfig-checker = "latest"
harper-cli = "latest"
hk = "1.49.0"
mdbook = "0.5.2"
pkl = "latest"
ruff = "latest"
rumdl = "latest"
shellcheck = "latest"
shfmt = "latest"
tombi = "latest"
ty = "latest"
typos = "latest"
uv = "latest"
yamlfmt = "latest"
yamllint = "latest"
zizmor = "latest"

[env]
GIT_CONFIG_PARAMETERS = "'merge.ff=only'"
HK_MISE = 1

[hooks]
postinstall = "hk install --mise"

[tasks.check]
description = "Run repository validation"
run = "hk check -a"

[tasks.fix]
description = "Apply deterministic repository fixes"
run = "hk fix -a"

[tasks."docs:check"]
description = "Validate and build the documentation"
depends = ["docs:build"]
run = "uv run scripts/check-docs.py"

[tasks."docs:build"]
description = "Build the documentation site"
run = "mdbook build docs"

[tasks."docs:serve"]
description = "Serve the documentation site locally"
usage = 'arg "[port]" help="Port to serve on" default="3000"'
run = '''
#!/usr/bin/env bash
set -euo pipefail
mdbook serve docs --port "${usage_port:-3000}"
'''

[tasks.release]
description = "Prepare and optionally push a dstack release using semantic-release"
alias = "pub"
quiet = true
usage = '''
flag "-p --push" help="Push the release commit and annotated tag to the remote"
flag "-n --noop" help="Test what semantic-release will do"
'''
run = '''
#!/bin/bash

args=()
[ -n "${usage_noop}" ] && args+=("--noop")

vargs=("--no-vcs-release")
[ -z "${usage_push}" ] && vargs+=("--no-push")

uv run semantic-release "${args[@]}" version "${vargs[@]}"

[[ "${args[*]}" =~ --noop ]] && git restore uv.lock || true
'''

[tasks.release.env]
GIT_CONFIG_COUNT = 2
GIT_CONFIG_KEY_0 = "commit.gpgSign"
GIT_CONFIG_VALUE_0 = "true"
GIT_CONFIG_KEY_1 = "tag.gpgSign"
GIT_CONFIG_VALUE_1 = "true"
