#:schema https://mise.jdx.dev/schema/mise.json

[tools]
"github:anordal/shellharden" = "latest"
"npm:@contextlint/cli" = { version = "latest", aube_args = "--allow-low-downloads" }
"npm:markdown-table-formatter" = "latest"
"npm:markdownlint-cli" = "latest"
actionlint = "latest"
aube = "latest"
betterleaks = "latest"
cocogitto = "latest"
editorconfig-checker = "latest"
harper-cli = "latest"
hk = "1.49.0"
mdbook = "0.5.2"
pkl = "latest"
ruff = "latest"
rumdl = "latest"
shellcheck = "latest"
shfmt = "latest"
tombi = "latest"
ty = "latest"
typos = "latest"
uv = "latest"
yamlfmt = "latest"
yamllint = "latest"
zizmor = "latest"

[env]
GIT_CONFIG_PARAMETERS = "'merge.ff=only'"
HK_MISE = 1

[hooks]
postinstall = "hk install --mise"

[tasks.check]
description = "Run repository validation"
run = "hk check -a"

[tasks.fix]
description = "Apply deterministic repository fixes"
run = "hk fix -a"

[tasks."docs:check"]
description = "Validate and build the documentation"
depends = ["docs:build"]
run = "uv run scripts/check-docs.py"

[tasks."docs:build"]
description = "Build the documentation site"
run = "mdbook build docs"

[tasks."docs:deployment:enable"]
description = "Enable GitHub Pages deployment"
run = "python3 scripts/enable-docs-deployment.py"

[tasks."docs:serve"]
description = "Serve the documentation site locally"
usage = 'arg "[port]" help="Port to serve on" default="3000"'
run = '''
#!/usr/bin/env bash
set -euo pipefail
mdbook serve docs --port "${usage_port:-3000}"
'''

[tasks.release]
description = "Prepare and optionally push a dstack release using Cocogitto"
alias = "pub"
quiet = true
usage = '''
flag "-p --push" help="Push the release commit and signed tag to the remote"
flag "-n --noop" help="Print the next version without changing the repository"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

tag=$(cog bump --dry-run --auto)
if [ -n "${usage_noop:-}" ]; then
  printf '%s\n' "$tag"
  exit 0
fi

if git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
  printf 'release tag already exists: %s\n' "$tag" >&2
  exit 1
fi
trap 'git tag -d "$tag" >/dev/null 2>&1 || true' ERR

cog bump --auto --disable-bump-commit
git commit -S -m "release: $tag"
git tag -f -s "$tag" -m "$tag"
trap - ERR

if [ -n "${usage_push:-}" ]; then
  git push --atomic origin HEAD "$tag"
fi
'''
