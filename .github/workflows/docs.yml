name: Publish Docs
if: vars.DOCS_DEPLOYMENT_ENABLED == 'true'

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read    # Needed to check out the repository code
  id-token: write    # Needed to verify the deployment originates from a secure source via OIDC
  pages: write       # Needed to create and push the Pages deployment

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: false

      - name: Build docs
        run: mise run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

