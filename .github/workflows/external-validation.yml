name: external-validation
on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"
  push:
    tags:
      - "v*"
permissions:
  contents: read
jobs:
  skills-cli:
    name: Skills CLI discovery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          python-version: "3.13"
      - uses: actions/setup-node@v6 # zizmor: ignore[cache-poisoning]
        with:
          node-version: 24
      - run: uv run --frozen --group test pytest -m external --durations=10
