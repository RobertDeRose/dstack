name: external-validation
on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"
  push:
    tags:
      - "v*"
permissions:
  contents: read
jobs:
  skills-cli:
    name: Skills CLI discovery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          python-version: "3.13"
      # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # zizmor: ignore[cache-poisoning]
        with:
          node-version: 24
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          cache: false
          install: false
      - env:
          MISE_IGNORED_CONFIG_PATHS: /home/runner/.config/mise/config.toml
        run: mise install --locked
      - run: uv run --frozen --group test pytest -m external --durations=10
