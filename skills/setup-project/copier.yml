_min_copier_version: "9.16.0"
_subdirectory: template
_answers_file: .copier-answers.yml
_templates_suffix: .jinja
_preserve_symlinks: false
_cleanup_on_error: true
_envops:
  variable_start_string: "[["
  variable_end_string: "]]"
  block_start_string: "[%"
  block_end_string: "%]"
  comment_start_string: "[#"
  comment_end_string: "#]"
  keep_trailing_newline: true
_exclude:
  - "**/__pycache__"
  - "**/*.py[co]"
  - ".DS_Store"
_message_after_copy: |
  dstack project scaffold created.
  Commit the generated files before running `copier update`.
  Setup initializes Beads when available and validates the generated workflow.
_message_after_update: |
  dstack template changes applied.
  Review the diff and any conflicts, then run `uv run scripts/check-docs.py`.
project_name:
  type: str
  help: Human-readable project name.
  default: Project
project_slug:
  type: str
  help: Stable lowercase project slug.
  default: "[[ project_name | lower | replace(' ', '-') | replace('_', '-') ]]"
project_purpose:
  type: str
  help: One-sentence description of the problem and intended outcome.
project_users:
  type: str
  help: One-sentence description of the intended users.
project_scope:
  type: str
  help: One-sentence description of current supported scope.
project_boundaries:
  type: str
  help: One-sentence description of key exclusions and ownership boundaries.
project_kind:
  type: str
  help: Project kind used to tailor documentation guidance.
  choices:
    - library
    - cli
    - service
    - application
    - infrastructure
    - documentation
    - other
language_profiles:
  type: yaml
  help: Ordered implementation-language list, such as [python, typescript].
  default:
    - other
  validator: |
    [% set supported = ['python', 'typescript', 'rust', 'go', 'elixir', 'nix', 'other'] %]
    [% set validation = namespace(unknown=[], canonical=[]) %]
    [% set invalid_type = language_profiles is mapping or language_profiles is string %]
    [% set invalid_type = invalid_type or language_profiles is not sequence or not language_profiles %]
    [% if invalid_type %]
    Select at least one language profile as a YAML list.
    [% else %]
    [% for profile in language_profiles %]
    [% if profile not in supported %][% set validation.unknown = validation.unknown + [profile] %][% endif %]
    [% endfor %]
    [% for profile in supported %]
    [% if profile in language_profiles %][% set validation.canonical = validation.canonical + [profile] %][% endif %]
    [% endfor %]
    [% if validation.unknown %]
    Unknown language profile: [[ validation.unknown | join(', ') ]].
    [% elif language_profiles | unique | list | length != language_profiles | length %]
    Language profiles must not contain duplicates.
    [% elif 'other' in language_profiles and language_profiles | length > 1 %]
    The other profile cannot be combined with recognized profiles.
    [% elif language_profiles != validation.canonical %]
    Language profiles must use canonical order: [[ validation.canonical | join(', ') ]].
    [% endif %]
    [% endif %]
repository_layout:
  type: str
  help: Repository layout; older answer files default to single-package.
  choices:
    - single-package
    - monorepo
  default: single-package
# yamllint disable rule:line-length
monorepo_packages:
  type: yaml
  help: Explicit 1–32 package objects for monorepo mode.
  default: []
  when: "[[ repository_layout == 'monorepo' ]]"
  validator: |
    [% set profiles = ['python', 'typescript', 'rust', 'go', 'elixir', 'nix', 'other'] %]
    [% set required = ['display_name', 'language_profiles', 'path', 'slug'] %]
    [% set state = namespace(error='') %]
    [% if monorepo_packages is mapping or monorepo_packages is string or monorepo_packages is not sequence %]
    [% set state.error = 'monorepo_packages must be a list.' %]
    [% elif repository_layout == 'single-package' and monorepo_packages %]
    [% set state.error = 'Single-package mode requires an empty package list.' %]
    [% elif repository_layout == 'monorepo' and (monorepo_packages | length < 1 or monorepo_packages | length > 32) %]
    [% set state.error = 'Monorepo mode requires 1-32 packages.' %]
    [% endif %]
    [% for package in monorepo_packages if not state.error %]
    [% if package is not mapping or package.keys() | sort | list != required %]
    [% set state.error = 'Each package must contain exactly display_name, slug, path, and language_profiles.' %]
    [% elif package.display_name is not string or not package.display_name | trim or '\n' in package.display_name or '\r' in package.display_name %]
    [% set state.error = 'Package display_name must be nonempty single-line text.' %]
    [% elif package.slug is not string or not package.slug or package.slug != package.slug | lower or package.slug.startswith('-') or package.slug.endswith('-') or '--' in package.slug %]
    [% set state.error = 'Package slug must be lowercase alphanumeric words separated by hyphens.' %]
    [% elif package.path is not string or not package.path or package.path.startswith('/') or '\\' in package.path or '' in package.path.split('/') or '.' in package.path.split('/') or '..' in package.path.split('/') %]
    [% set state.error = 'Package path must be a normalized relative POSIX path.' %]
    [% elif package.path.split('/')[0].casefold() in ['.git', '.beads', 'docs', 'migration', 'scripts', 'skills'] %]
    [% set state.error = 'Package path is reserved for root-owned state.' %]
    [% elif package.language_profiles is mapping or package.language_profiles is string or package.language_profiles is not sequence or not package.language_profiles %]
    [% set state.error = 'Package language_profiles must be a nonempty list.' %]
    [% elif package.language_profiles | unique | list | length != package.language_profiles | length or ('other' in package.language_profiles and package.language_profiles | length > 1) %]
    [% set state.error = 'Package language_profiles must be unique and other is exclusive.' %]
    [% endif %]
    [% for character in package.slug if not state.error and character not in 'abcdefghijklmnopqrstuvwxyz0123456789-' %]
    [% set state.error = 'Package slug contains an unsupported character.' %]
    [% endfor %]
    [% for character in package.path if not state.error and character not in 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789._-/' %]
    [% set state.error = 'Package path contains an unsupported character.' %]
    [% endfor %]
    [% for component in package.path.split('/') %]
    [% if not state.error and component and component[0] not in 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789' %]
    [% set state.error = 'Each package path component must start with an ASCII letter or digit.' %]
    [% endif %]
    [% endfor %]
    [% set order = namespace(selected=[]) %]
    [% for profile in profiles if profile in package.language_profiles %][% set order.selected = order.selected + [profile] %][% endfor %]
    [% if not state.error and order.selected != package.language_profiles %][% set state.error = 'Package language_profiles must use canonical supported order.' %][% endif %]
    [% endfor %]
    [% for package in monorepo_packages if not state.error %]
    [% set outer_index = loop.index0 %]
    [% for other in monorepo_packages if not state.error %]
    [% set left = package.path.casefold() %][% set right = other.path.casefold() %]
    [% if outer_index != loop.index0 and (left == right or left.startswith(right + '/') or right.startswith(left + '/') or package.slug.casefold() == other.slug.casefold()) %]
    [% set state.error = 'Package slugs and paths must be case-fold unique and paths cannot overlap.' %]
    [% endif %]
    [% endfor %]
    [% endfor %]
    [% set union = namespace(selected=[]) %]
    [% for profile in profiles if profile != 'other' %]
    [% for package in monorepo_packages if profile in package.language_profiles %][% if profile not in union.selected %][% set union.selected = union.selected + [profile] %][% endif %][% endfor %]
    [% endfor %]
    [% if not union.selected %][% for package in monorepo_packages if 'other' in package.language_profiles %][% set union.selected = ['other'] %][% endfor %][% endif %]
    [% if repository_layout == 'monorepo' and language_profiles != union.selected %][% set state.error = 'Root language_profiles must equal the canonical package profile union.' %][% endif %]
    [% if state.error %][[ state.error ]][% endif %]
# yamllint enable rule:line-length
repository_default_branch:
  type: str
  help: Default Git branch used by feature worktrees.
  default: main
dstack_template_channel:
  type: str
  choices:
    - stable
    - unstable
  default: stable
  when: false
include_readme:
  type: bool
  default: true
  when: false
